<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;max-width:560px;margin:0 auto;padding:20px;">
    <h2 style="font-size:18px;margin:0 0 4px 0;">New Print Order</h2>
    <p style="color:#888;font-size:13px;margin:0 0 16px 0;">
        {{_time}} &middot; ID: {{_id}}
    </p>

    <table style="width:100%;border-collapse:collapse;margin:0 0 16px 0;border:1px solid #e5e7eb;border-radius:6px;">
        <tr style="background:#ecfdf5;">
            <td style="padding:10px 12px;font-weight:bold;">Customer</td>
            <td style="padding:10px 12px;">{{customer_name}} &lt;{{email}}&gt;</td>
        </tr>
        <tr>
            <td style="padding:8px 12px;font-weight:bold;">Product</td>
            <td style="padding:8px 12px;">{{product}}</td>
        </tr>
        <tr style="background:#f9fafb;">
            <td style="padding:8px 12px;font-weight:bold;">Payment</td>
            <td style="padding:8px 12px;">{{payment_method}}</td>
        </tr>
        <tr>
            <td style="padding:10px 12px;font-weight:bold;font-size:1.1em;">Total</td>
            <td style="padding:10px 12px;font-size:1.1em;color:#10b981;font-weight:bold;">&euro;{{order_total}}</td>
        </tr>
    </table>

    <h3 style="font-size:15px;margin:0 0 8px 0;">Full order details</h3>
    {{_summary}}

    <p style="color:#888;font-size:12px;margin-top:24px;border-top:1px solid #eee;padding-top:12px;">
        Sent by BareBonesForms
    </p>
</body>
</html>
