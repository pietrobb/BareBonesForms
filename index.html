<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BareBonesForms — Demo</title>
    <link rel="stylesheet" href="bbf.css">
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background: #f8f8f8;
            min-height: 100vh;
        }
        .page-header {
            max-width: 540px;
            margin: 0 auto 32px;
            text-align: center;
        }
        .page-header h1 {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            margin: 0 0 6px 0;
            color: #1a1a1a;
        }
        .page-header p {
            color: #888;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
        }
        .page-header .skull {
            font-size: 36px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="skull">💀</div>
        <h1>BareBonesForms</h1>
        <p>Forms for developers, not for clicking around.</p>
    </div>

    <!-- That's it. One div, one attribute. -->
    <div data-form="kontakt"></div>

    <script src="bbf.js"></script>
</body>
</html>
